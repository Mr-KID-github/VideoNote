services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vinote}
      POSTGRES_USER: ${POSTGRES_USER:-vinote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-to-a-long-random-db-password}
    ports:
      - "${POSTGRES_PORT:-54322}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vinote} -d ${POSTGRES_DB:-vinote}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: vinote-backend:local
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8900
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-vinote}:${POSTGRES_PASSWORD:-change-me-to-a-long-random-db-password}@postgres:5432/${POSTGRES_DB:-vinote}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3100,http://127.0.0.1:3100}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8900}:8900"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8900/healthz').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: vinote-frontend:local
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3100}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/runtime-config.js >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
