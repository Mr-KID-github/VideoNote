# 本地 Supabase Docker 配置
version: '3.8'

services:
  supabase:
    image: supabase/supabase:latest
    container_name: videonote-supabase
    ports:
      - "54321:54321"      # API
      - "54322:54322"      # Postgres
      - "54323:54323"      # Studio
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase_data:/var/lib/postgresql/data

volumes:
  supabase_data:
